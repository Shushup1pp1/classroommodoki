<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クラス - Classroomもどき()</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f6f8fc;
}

header{
    background:#4285f4;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.button{
    background:#4285f4;
    color:white;
    border:none;
    border-radius:10px;
    padding:10px 16px;
    cursor:pointer;
}

.button:hover{
    opacity:.9;
}

.section-title{
    margin-top:0;
}

.code{
    background:#eef3ff;
    padding:8px 12px;
    border-radius:8px;
    display:inline-block;
}

</style>
</head>
<body>

<header>

    <button
        class="button"
        onclick="location.href='home.html'">
        ← ホーム
    </button>

    <h1 id="className">
        読み込み中...
    </h1>

</header>

<div class="container">

    <div class="card">

        <h2>クラス情報</h2>

        <p>
            クラスコード:
            <span
                id="classCode"
                class="code">
                読み込み中...
            </span>
        </p>

    </div>

    <div class="card">

        <h2 class="section-title">
            📢 お知らせ
        </h2>

        <p>
            まだお知らせはありません。
        </p>

    </div>

    <div class="card">

        <h2 class="section-title">
            💬 チャット
        </h2>

        <p>
            チャット機能は準備中です。
        </p>

    </div>

    <div class="card">

        <h2 class="section-title">
            📁 ファイル
        </h2>

        <p>
            ファイル共有機能は準備中です。
        </p>

    </div>

    <div class="card">

        <h2 class="section-title">
            📝 課題
        </h2>

        <p>
            まだ課題はありません。
        </p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient =
    window.supabase.createClient(
        "https://iuizsupfouqqzfgynpcw.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1aXpzdXBmb3VxcXpmZ3lucGN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTk1ODMsImV4cCI6MjA5NzQzNTU4M30.ZjrGFqeXX2evo22zEM4A5YuCCbR9DNCH_0HIagfTBPE"
    );

async function loadClass(){

    const params =
        new URLSearchParams(
            location.search
        );

    const classCode =
        params.get("code");

    if(!classCode){

        alert("クラスコードがありません");

        location.href =
            "home.html";

        return;
    }

    const { data, error } =
        await supabaseClient
        .from("classes")
        .select("*")
        .eq("class_code", classCode);

    if(error || data.length === 0){

        alert("クラスが見つかりませーん　ちゃんとホームから参加してね");

        location.href =
            "home.html";

        return;
    }

    const cls =
        data[0];

    document.getElementById(
        "className"
    ).textContent =
        "📚 " +
        cls.class_name;

    document.getElementById(
        "classCode"
    ).textContent =
        cls.class_code;

    document.title =
        cls.class_name +
        " - Classroomもどき()";
}

loadClass();

</script>

</body>
</html>
