クラスを開いてください。

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
// Create a single supabase client for interacting with your database
const supabaseClient = 
      window.supabase.createClient(
            'https://iuizsupfouqqzfgynpcw.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1aXpzdXBmb3VxcXpmZ3lucGN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTk1ODMsImV4cCI6MjA5NzQzNTU4M30.ZjrGFqeXX2evo22zEM4A5YuCCbR9DNCH_0HIagfTBPE'
      );
let currentClassCode=null;
function getCookie(name){

    const cookies =
        document.cookie.split("; ");

    for(const cookie of cookies){

        const parts =
            cookie.split("=");

        if(parts[0] === name){

            return parts.slice(1).join("=");

        }

    }

    return null;

}
async function checkAdmin(){

    const sessionToken =
        getCookie("session");

    if(!sessionToken){

        alert("ログインしてください");

        location.href = "login.html";

        return;

    }

    // セッション取得
    const { data: sessionData, error: sessionError } =
        await supabaseClient
        .from("sessions")
        .select("*")
        .eq("session_token", sessionToken);

    if(sessionError || sessionData.length === 0){

        alert("セッションが無効です");

        location.href = "login.html";

        return;

    }

    const username =
        sessionData[0].username;

    // ユーザー取得
    const { data: userData, error: userError } =
        await supabaseClient
        .from("users")
        .select("role")
        .eq("username", username);

    if(userError || userData.length === 0){

        alert("ユーザーが存在しません");

        location.href = "home.html";

        return;

    }

    if(userData[0].role !== "admin"){

        alert("管理者権限がありません");

        location.href = "home.html";

        return;

    }

    console.log("✅ 管理者認証成功");

}

async function openClass(){

    currentClassCode=
        document.getElementById(
            "classCode"
        ).value;

    if(currentClassCode===""){

        alert("クラスコードを入力してください");

        return;

    }

    document.getElementById(
        "adminPanel"
    ).style.display="block";

    showMembers();

}

function showMembers(){

    document.getElementById(
        "content"
    ).innerHTML=`
        <h2>👥 メンバー管理</h2>

        読み込み中...
    `;

}

function showChat(){

}

function showAnnouncements(){

function showFiles(){

}

checkAdmin();

</script>
